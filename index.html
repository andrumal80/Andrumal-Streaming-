<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Mis Cuentas</title>
    <meta name="theme-color" content="#007bff">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .contenedor { max-width: 500px; width: 100%; text-align: center; }
        
        .header { background: #007bff; color: white; padding: 30px 20px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }

        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .btn-menu { 
            background: white; border: none; padding: 20px; border-radius: 20px; 
            display: flex; align-items: center; gap: 15px; text-decoration: none;
            color: #333; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;
            border-left: 10px solid #ccc;
        }
        .btn-menu:active { transform: scale(0.98); }

        /* Colores por sección */
        .color-monitor { border-left-color: #007bff; }
        .color-nube { border-left-color: #2d3748; }
        .color-dash { border-left-color: #2d9d96; }
        .color-win { border-left-color: #e74c3c; }
        .color-netflix-jose { border-left-color: #e50914; }

        .icono { font-size: 28px; }
        .detalle { display: flex; flex-direction: column; text-align: left; }
        .detalle span { font-size: 12px; color: #888; font-weight: normal; }

        .footer { margin-top: 30px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="header">
        <h1>MIS CUENTAS PRO</h1>
        <p>Sistema de Respaldo Web 2026</p>
    </div>

    <div class="grid-menu">
        <a href="monitor.html" class="btn-menu color-monitor">
            <div class="icono">📅</div>
            <div class="detalle">
                Monitor Maestro
                <span>Calendario y Vencimientos</span>
            </div>
        </a>

        <a href="sincronizador.html" class="btn-menu color-nube">
            <div class="icono">☁️</div>
            <div class="detalle">
                Nube Maestra
                <span>Sincronizar con PIN</span>
            </div>
        </a>

        <a href="netflix_jose.html" class="btn-menu color-netflix-jose">
            <div class="icono">🎬</div>
            <div class="detalle">
                Netflix José
                <span>Base de Datos de Cuentas</span>
            </div>
        </a>

        <a href="win.html" class="btn-menu color-win">
            <div class="icono">⚽</div>
            <div class="detalle">
                Dashboard Win Sport
                <span>Carga de Correo Único</span>
            </div>
        </a>
    </div>

    <div class="footer">
        Acceso Privado Protegido por Firebase<br>
        Versión Web Pro PWA
    </div>
</div>

</body>
</html>
